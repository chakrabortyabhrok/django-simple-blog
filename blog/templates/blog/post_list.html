{% extends "core/base.html" %}

{% block content %}
    <h1>Blog Posts</h1>

    {% for post in posts %}
        <div>
            <h2>{{ post.title }}</h2>
            <p>{{ post.excerpt }}</p>
            <small>Published on {{ post.date }}</small>
            <br>
            <a href="{% url 'blog:post_detail' post.slug %}">Read More →</a>
        </div>
        <hr>
    {% endfor %}
{% endblock %}
