{% extends "core/base.html" %}

{% block content %}
    <h1>Blog Posts</h1>
    <p class="lead">Latest articles and learnings from my Django roadmap</p>

    {% for post in posts %}
        <div class="post-card">
            <h2>{{ post.title }}</h2>
            <p class="excerpt">{{ post.excerpt }}</p>
            <small>Published on {{ post.date }}</small>
            <br><br><br>
            <a href="{% url 'blog:post_detail' post.slug %}" class="btn btn-primary">
                Read Full Post →
            </a>
        </div>
    {% endfor %}

{% endblock %}
