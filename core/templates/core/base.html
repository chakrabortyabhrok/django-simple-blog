<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Templates{% endblock %}</title>
    <style>
        body { 
            font-family: Arial, sans-serif;
            margin: 40px; 
        }
        header { 
            background: #8bb1f8; 
            color: black; 
            padding: 20px; 
            text-align: center; 
        }
        footer { 
            margin-top: 50px; 
            text-align: center;
            color: #bb2020; 
        }
        nav a {
            color: black;
            text-decoration: none;
        }
        nav a:hover {
            color: #ff3737;
        }
        .separator {
            color: #ff9800;
            font-weight: bold;
            margin: 0 10px;
        }
        
    </style>
</head>
<body>
    <header>
        <h1>My Django Learning Project</h1>
        <nav>
            <a href="{% url 'core:home_page' %}">Home</a> &nbsp;|&nbsp;
            <a href="{% url 'core:about_page' %}">About</a>
        </nav>
    </header>

    {% block content %}
        <p>Welcome to my first Django learning project. Day - 2 — Templete Inheritence</p>
    {% endblock %}

    <footer>
        <p>&copy; 2026 - Day 2 of Learning Django - Template Inheritance</p>
    </footer>
</body>
</html>
